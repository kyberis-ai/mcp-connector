name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: MCP Connector Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm test
      - run: npm pack --dry-run
