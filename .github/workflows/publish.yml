name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Stage npm package
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          package_version="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version" >&2
            exit 1
          fi

      - run: npm install -g npm@11.15.0
      - run: npm --version
      - run: npm test
      - run: npm pack --dry-run
      - run: npm stage publish --access public
